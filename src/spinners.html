<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root { --brand: #C47756; --brand-hover: #b06548; }
  body { background: #111; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 60px; font-family: Arial, sans-serif; color: #fff; margin: 0; }
  h2 { color: rgba(255,255,255,0.5); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }

  /* 1. Pulsing dots */
  .loading-dots { display: flex; gap: 6px; justify-content: center; }
  .loading-dots span { width: 10px; height: 10px; border-radius: 50%; background: var(--brand); animation: pulse 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.7); opacity: 0.5; } }

  /* 2. Ring spinner (thick brand color) */
  .spinner-ring { width: 44px; height: 44px; border-radius: 50%; border: 5px solid rgba(255,255,255,0.15); border-top-color: var(--brand); animation: spin 0.9s linear infinite; margin: 0 auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* 3. Dual ring */
  .spinner-dual { width: 44px; height: 44px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--brand); border-bottom-color: rgba(255,255,255,0.3); animation: spin 1s linear infinite; margin: 0 auto; }

  /* 4. Skew pulse bar */
  .loading-bar { width: 50px; height: 6px; background: var(--brand); animation: skewPulse 1s ease-in-out infinite; margin: 0 auto; border-radius: 3px; }
  @keyframes skewPulse { 0%,100% { transform: skewX(0deg); opacity: 1; } 50% { transform: skewX(20deg); opacity: 0.5; } }

  /* 5. Triple ring bounce */
  .spinner-bounce { display: flex; gap: 8px; justify-content: center; align-items: center; }
  .spinner-bounce span { width: 12px; height: 12px; border-radius: 50%; background: var(--brand); animation: bounce 1.2s ease-in-out infinite; }
  .spinner-bounce span:nth-child(1) { animation-delay: 0s; }
  .spinner-bounce span:nth-child(2) { animation-delay: 0.15s; }
  .spinner-bounce span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

  /* 6. Gradient ring */
  .spinner-gradient { width: 44px; height: 44px; border-radius: 50%; background: conic-gradient(var(--brand), rgba(255,255,255,0.1), var(--brand)); -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #fff calc(100% - 5px)); mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #fff calc(100% - 5px)); animation: spin 1s linear infinite; margin: 0 auto; }

  .row { display: flex; flex-direction: column; align-items: center; gap: 16px; }
</style>
</head>
<body>

  <div class="row">
    <h2>1. Pulsing Dots</h2>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="row">
    <h2>2. Thick Ring</h2>
    <div class="spinner-ring"></div>
  </div>

  <div class="row">
    <h2>3. Dual Ring</h2>
    <div class="spinner-dual"></div>
  </div>

  <div class="row">
    <h2>4. Skew Bar</h2>
    <div class="loading-bar"></div>
  </div>

  <div class="row">
    <h2>5. Bounce</h2>
    <div class="spinner-bounce">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="row">
    <h2>6. Gradient Ring</h2>
    <div class="spinner-gradient"></div>
  </div>

</body>
</html>
