<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Immediate loading state — visible before React even loads -->
    <style>
        body { margin: 0; background: #111; }
        #root:empty::after {
            content: 'Loading property...';
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            color: rgba(255,255,255,0.5);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        window.__SUPABASE_URL__ = '{{SUPABASE_URL}}';
        window.__SUPABASE_ANON_KEY__ = '{{SUPABASE_ANON_KEY}}';
        window.__PROPERTY_SLUG__ = '{{PROPERTY_SLUG}}';
    </script>

    <!-- React CDN (production, no sourcemaps) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- App (pre-compiled plain JS — no Babel needed) -->
    <script src="app.js"></script>
</body>
</html>
