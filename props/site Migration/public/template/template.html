<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - {{LOCATION}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: transparent;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        
        .p-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('{{HERO_IMAGE}}') center/cover no-repeat;
            z-index: 0;
        }
        
        .p-bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
.p-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15);
        }
        
        .p-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            z-index: 20;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
        }
        
        .p-nav-logo { display: flex; align-items: center; gap: 6px; }
        .p-nav-icon { font-size: 1rem; color: white; }
        .p-nav-brand { font-size: 0.75rem; font-weight: 500; color: white; letter-spacing: 0.02em; }
        .p-nav-links { display: flex; align-items: center; gap: 8px; }
        .p-nav-link { font-size: 0.65rem; color: #fff; text-decoration: none; font-weight: 400; }
        .p-nav-cta { padding: 4px 10px; background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(8px); border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.2); }
        
        /* Blurred container */
        .p-bottom {
            position: absolute;
            bottom: 52px;
            left: 0;
            right: 0;
            padding: 16px 14px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 10;
        }
        
        .p-title { 
            font-family: 'Inter', sans-serif; 
            font-size: 1rem; 
            font-weight: 400; 
            letter-spacing: 0.02em; 
            text-transform: uppercase; 
            color: white; 
            margin-bottom: 4px; 
            line-height: 1.2; 
        }
        
        .p-location { 
            font-size: 0.65rem; 
            color: rgba(255, 255, 255, 0.65); 
            margin-bottom: 8px; 
        }
        
        .p-price { 
            font-size: 1.1rem; 
            font-weight: 600; 
            color: white; 
            margin-bottom: 8px; 
        }
        
        .p-price span { 
            font-size: 0.65rem; 
            font-weight: 400; 
            color: rgba(255, 255, 255, 0.7); 
        }
        
        .p-description { 
            font-size: 0.65rem; 
            color: rgba(255, 255, 255, 0.85); 
            line-height: 1.4; 
            margin-bottom: 8px; 
        }
        
        .p-details { 
            display: flex; 
            gap: 8px; 
            flex-wrap: nowrap; 
            overflow-x: auto; 
            justify-content: flex-start; 
        }
        
        .p-detail { 
            display: flex; 
            align-items: center; 
            gap: 4px; 
            font-size: 0.45rem; 
            color: #fff; 
            background: rgba(255, 255, 255, 0.15); 
            padding: 2px 6px; 
            border-radius: 4px; 
        }
        
        .p-detail svg { 
            width: 10px; 
            height: 10px; 
        }
        
        /* Bottom banner */
        .p-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 14px;
            background: #000000;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .p-banner-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .p-banner-stars {
            display: flex;
            gap: 2px;
        }
        
        .p-banner-stars svg {
            width: 12px;
            height: 12px;
            fill: #fbbf24;
        }
        
        .p-banner-text {
            font-size: 0.45rem;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .p-book-btn {
            padding: 8px 20px;
            background: #ff5a5f;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .p-book-btn:hover {
            background: #ff474c;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="p-bg"></div>
        <img class="p-bg-img" src="{{HERO_IMAGE}}" alt="Hero">
    
    <nav class="p-nav">
        <div class="p-nav-logo"><span class="p-nav-icon">◈</span><span class="p-nav-brand">{{BRAND_NAME}}</span></div>
        <div class="p-nav-links"><a href="#" class="p-nav-link p-nav-cta">Sign up</a></div>
    </nav>
    
    <!-- Info card container -->
    <div class="p-bottom">
        <h1 class="p-title">{{TITLE}}</h1>
        <p class="p-location">{{LOCATION}}</p>
        <div class="p-price">${{PRICE}} <span>/ night</span></div>
        <p class="p-description">{{DESCRIPTION}}</p>
        <div class="p-details">
            {{DETAILS}}
        </div>
    </div>
    
    <!-- Bottom banner with rating + button -->
    <div class="p-banner">
        <div class="p-banner-left">
            <div class="p-banner-stars">
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
            <span class="p-banner-text">{{REVIEW_COUNT}} review{{REVIEW_PLURAL}}</span>
        </div>
        <button class="p-book-btn">Book Now</button>
    </div>
</body>
</html>
